<!-- Cartões -->
<button class="adm-section-btn" onclick="admToggle('adm-cartoes-section');admRenderCartoes()">
  🟡 Gerenciar Cartões <span>›</span>
</button>
<div class="adm-collapsible" id="adm-cartoes-section">
  <div class="adm-card">
    <h3>🟡🔴 Cartões por Jogo</h3>
    <p style="font-size:0.78rem;color:rgba(255,255,255,0.4);margin-bottom:16px;line-height:1.6;">
      Selecione o time e o jogador para registrar ou remover cartões. 2 amarelos ou 1 vermelho geram suspensão automática.
    </p>
    <div id="cartoes-step1">
      <div class="adm-field" style="margin-bottom:14px">
        <label>Selecione o Time</label>
        <select id="cart-sel-time" onchange="cartCarregarJogadores()">
          <option value="">— escolha o time —</option>
        </select>
      </div>
    </div>
    <div id="cartoes-step2" style="display:none">
      <div class="adm-field" style="margin-bottom:14px">
        <label>Selecione o Jogador</label>
        <select id="cart-sel-jogador" onchange="cartAtualizarInfo()">
          <option value="">— escolha o jogador —</option>
        </select>
      </div>
      <!-- Info do jogador selecionado -->
      <div id="cart-jogador-info" style="display:none;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <div style="flex:1;min-width:120px">
          <div id="cart-info-nome" style="font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;"></div>
          <div id="cart-info-time" style="font-size:0.72rem;color:rgba(255,255,255,0.4);"></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span id="cart-info-amarelos" style="background:rgba(240,192,64,0.15);border:1px solid rgba(240,192,64,0.4);border-radius:6px;padding:4px 12px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);">🟡 0</span>
          <span id="cart-info-vermelhos" style="background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.4);border-radius:6px;padding:4px 12px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#e74c3c;">🔴 0</span>
          <span id="cart-info-susp" style="display:none;font-size:0.72rem;font-weight:700;padding:4px 10px;border-radius:4px;background:rgba(192,57,43,0.2);color:#e74c3c;border:1px solid rgba(192,57,43,0.4);">⛔ SUSPENSO</span>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">
        <button class="adm-btn" style="background:rgba(240,192,64,0.15);border-color:var(--gold);color:var(--gold);" onclick="cartDar('amarelo')">🟡 DAR AMARELO</button>
        <button class="adm-btn" style="background:rgba(192,57,43,0.15);border-color:#e74c3c;color:#e74c3c;" onclick="cartDar('vermelho')">🔴 DAR VERMELHO</button>
        <button class="adm-btn sec" onclick="cartRemover()">↩ Remover Último</button>
      </div>
      <div id="cart-msg" style="font-size:0.8rem;min-height:18px;color:var(--green-light);margin-bottom:4px;"></div>
    </div>
    <!-- Visão geral -->
    <div id="cartoes-visao" style="margin-top:18px;"></div>
  </div>
</div>
